name: Process Trials

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  process-trials:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency:
      group: process-trials
      cancel-in-progress: true
    steps:
      - name: Trigger trial processing
        env:
          API_BASE_URL: ${{ secrets.FARMCONNECT_API_BASE_URL }}
          CRON_SECRET: ${{ secrets.FARMCONNECT_CRON_SECRET }}
        run: |
          set -e
          curl --fail-with-body --show-error --silent \
            --max-time 240 \
            -X POST "${API_BASE_URL}/api/cron/process-trials" \
            -H "x-cron-secret: ${CRON_SECRET}" \
            -H "Content-Type: application/json"
