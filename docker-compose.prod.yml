version: '3.8'

networks:
  farmconnect-prod:
    driver: bridge

volumes:
  mongo_prod_data:
    driver: local

services:
  # ==================
  # MongoDB Database (PROD)
  # ==================
  mongodb:
    image: mongo:6.0
    container_name: connectapi-mongodb-prod
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-connectapi}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: connectdb_prod
    volumes:
      - mongo_prod_data:/data/db
    networks:
      - farmconnect-prod
    ports:
      - "27017:27017"
    restart: always
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 30s
      timeout: 10s
      retries: 5
    security_opt:
      - no-new-privileges:true

  # ==================
  # Connect API Server (PROD)
  # ==================
  connectapi:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: connectapi-server-prod
    user: "node"
    working_dir: /home/node/app
    environment:
      - PORT=${PORT:-8888}
      - NODE_ENV=production
      - CONN_STR=${CONN_STR}
      - JWT_SECRET=${JWT_SECRET}
      - RABBITMQ_URL=${RABBITMQ_URL}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - CRON_SECRET=${CRON_SECRET}
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN}
      - SUPER_ADMIN_EMAIL=${SUPER_ADMIN_EMAIL}
      - SUPER_ADMIN_PASSWORD=${SUPER_ADMIN_PASSWORD}
      - SUPER_ADMIN_NAME=${SUPER_ADMIN_NAME:-Super Admin}
      - SUPER_ADMIN_ROTATE_PASSWORD=${SUPER_ADMIN_ROTATE_PASSWORD:-false}
    networks:
      - farmconnect-prod
    ports:
      - "${PORT:-8888}:${PORT:-8888}"
    command: npm start
    depends_on:
      mongodb:
        condition: service_healthy
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: wget -qO- http://localhost:${PORT:-8888}/health || exit 1
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true

  # ==================
  # Notification Worker (PROD)
  # ==================
  notification-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: connectapi-worker-prod
    user: "node"
    working_dir: /home/node/app
    environment:
      - NODE_ENV=production
      - RABBITMQ_URL=${RABBITMQ_URL}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - CONN_STR=${CONN_STR}
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - farmconnect-prod
    command: npm run worker
    depends_on:
      connectapi:
        condition: service_started
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

  # ==================
  # Cron Job Worker (PROD)
  # ==================
  cron-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: connectapi-cron-prod
    user: "node"
    working_dir: /home/node/app
    environment:
      - NODE_ENV=production
      - CONN_STR=${CONN_STR}
      - JWT_SECRET=${JWT_SECRET}
      - CRON_SECRET=${CRON_SECRET}
    networks:
      - farmconnect-prod
    command: npm run cron
    depends_on:
      connectapi:
        condition: service_started
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
