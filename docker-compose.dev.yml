networks:
  farmconnect-dev:
    driver: bridge

volumes:
  mongo_data_dev:
    driver: local
  rabbitmq_data_dev:
    driver: local

services:
  # ==================
  # MongoDB Database (Development)
  # ==================
  mongodb:
    image: mongo:6.0-alpine
    container_name: farmconnect-mongodb-dev
    environment:
      MONGO_INITDB_ROOT_USERNAME: connectapi
      MONGO_INITDB_ROOT_PASSWORD: connectapi
      MONGO_INITDB_DATABASE: connectdb
    volumes:
      - mongo_data_dev:/data/db
    networks:
      - farmconnect-dev
    ports:
      - "27017:27017"
    restart: unless-stopped
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================
  # Mongo Express (DB Admin)
  # ==================
  mongo-express:
    image: mongo-express:latest
    container_name: farmconnect-mongo-express-dev
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: connectapi
      ME_CONFIG_MONGODB_ADMINPASSWORD: connectapi
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: pass
    ports:
      - "8081:8081"
    networks:
      - farmconnect-dev
    depends_on:
      - mongodb
    restart: unless-stopped

  # ==================
  # RabbitMQ Message Queue (Development)
  # ==================
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: farmconnect-rabbitmq-dev
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data_dev:/var/lib/rabbitmq
    networks:
      - farmconnect-dev
    ports:
      - "5672:5672"    # AMQP port
      - "15672:15672"  # Management UI
    restart: unless-stopped
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================
  # Main API Service
  # ==================
  connectapi:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: connectapi-dev
    user: "node"
    working_dir: /home/node/app
    environment:
      - PORT=8888
      - NODE_ENV=development
      - CONN_STR=mongodb://connectapi:connectapi@mongodb:27017/connectdb?authSource=admin
      - JWT_SECRET=${JWT_SECRET:-dev-secret-key-change-in-production}
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - RESEND_API_KEY=${RESEND_API_KEY}
      - CRON_SECRET=${CRON_SECRET:-dev-cron-secret}
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN:-http://localhost:5173}
      - LOG_LEVEL=debug
    volumes:
      - ./:/home/node/app
      - /home/node/app/node_modules
    networks:
      - farmconnect-dev
    ports:
      - "8888:8888"
    command: npm run dev
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: wget -qO- http://localhost:8888/health || exit 1
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

  # ==================
  # Notification Worker
  # ==================
  notification-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: notification-worker-dev
    user: "node"
    working_dir: /home/node/app
    environment:
      - NODE_ENV=development
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - RESEND_API_KEY=${RESEND_API_KEY}
      - CONN_STR=mongodb://connectapi:connectapi@mongodb:27017/connectdb?authSource=admin
      - LOG_LEVEL=debug
    volumes:
      - ./:/home/node/app
      - /home/node/app/node_modules
    networks:
      - farmconnect-dev
    command: npm run worker
    depends_on:
      connectapi:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - worker

  # ==================
  # Cron Job Worker
  # ==================
  cron-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: cron-worker-dev
    user: "node"
    working_dir: /home/node/app
    environment:
      - NODE_ENV=development
      - CONN_STR=mongodb://connectapi:connectapi@mongodb:27017/connectdb?authSource=admin
      - CRON_SECRET=${CRON_SECRET:-dev-cron-secret}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - JWT_SECRET=${JWT_SECRET:-dev-secret-key}
      - LOG_LEVEL=debug
    volumes:
      - ./:/home/node/app
      - /home/node/app/node_modules
    networks:
      - farmconnect-dev
    command: npm run cron
    depends_on:
      connectapi:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - worker

  # ==================
  # Test Service (optional)
  # ==================
  test:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: connectapi-test
    user: "node"
    working_dir: /home/node/app
    environment:
      - NODE_ENV=test
      - CONN_STR=mongodb://connectapi:connectapi@mongodb:27017/connectdb?authSource=admin
      - JWT_SECRET=test-secret
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    volumes:
      - ./:/home/node/app
      - /home/node/app/node_modules
    networks:
      - farmconnect-dev
    command: npm run test:cov
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    profiles:
      - test
