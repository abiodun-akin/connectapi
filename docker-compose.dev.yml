version: '3.8'

networks:
  farmconnect-dev:
    driver: bridge

volumes:
  mongo_dev_data:
    driver: local
  rabbitmq_dev_data:
    driver: local

services:
  mongodb:
    image: mongo:6.0
    container_name: connectapi-mongodb-dev
    environment:
      MONGO_INITDB_ROOT_USERNAME: connectapi
      MONGO_INITDB_ROOT_PASSWORD: connectapi
      MONGO_INITDB_DATABASE: connectdb_dev
    volumes:
      - mongo_dev_data:/data/db
    networks:
      - farmconnect-dev
    ports:
      - "27017:27017"
    restart: unless-stopped
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: connectapi-rabbitmq-dev
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_dev_data:/var/lib/rabbitmq
    networks:
      - farmconnect-dev
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  connectapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: connectapi-dev
    user: "node"
    working_dir: /home/node/app
    environment:
      - PORT=8888
      - NODE_ENV=development
      - CONN_STR=mongodb://connectapi:connectapi@mongodb:27017/connectdb_dev?authSource=admin
      - JWT_SECRET=dev-secret-key-change-in-production
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - RESEND_API_KEY=${RESEND_API_KEY:-test_key}
      - CRON_SECRET=dev-cron-secret
    volumes:
      - ./:/home/node/app
      - /home/node/app/node_modules
    networks:
      - farmconnect-dev
    ports:
      - "8888:8888"
    command: npm run dev
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  notification-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: connectapi-worker-dev
    user: "node"
    working_dir: /home/node/app
    environment:
      - NODE_ENV=development
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - RESEND_API_KEY=${RESEND_API_KEY:-test_key}
      - CONN_STR=mongodb://connectapi:connectapi@mongodb:27017/connectdb_dev?authSource=admin
      - JWT_SECRET=dev-secret-key-change-in-production
    volumes:
      - ./:/home/node/app
      - /home/node/app/node_modules
    networks:
      - farmconnect-dev
    command: npm run worker
    depends_on:
      connectapi:
        condition: service_started
    restart: unless-stopped

  cron-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: connectapi-cron-dev
    user: "node"
    working_dir: /home/node/app
    environment:
      - NODE_ENV=development
      - CONN_STR=mongodb://connectapi:connectapi@mongodb:27017/connectdb_dev?authSource=admin
      - JWT_SECRET=dev-secret-key-change-in-production
      - CRON_SECRET=dev-cron-secret
    volumes:
      - ./:/home/node/app
      - /home/node/app/node_modules
    networks:
      - farmconnect-dev
    command: npm run cron
    depends_on:
      connectapi:
        condition: service_started
    restart: unless-stopped

  mongo-express:
    image: mongo-express:latest
    container_name: connectapi-mongo-express-dev
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: connectapi
      ME_CONFIG_MONGODB_ADMINPASSWORD: connectapi
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: pass
    networks:
      - farmconnect-dev
    ports:
      - "8081:8081"
    depends_on:
      - mongodb
    restart: unless-stopped
